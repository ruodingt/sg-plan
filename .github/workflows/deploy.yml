name: Deploy

on:
  workflow_dispatch:
    inputs:
      component:
        description: "Component to deploy"
        required: true
        type: choice
        options:
          - inference
          - kinesis
          - fraud_alert
          - fraud_feature_pipe
          - monitoring
          - github_oidc
      env:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - sit
          - prod

# All deployment variables (container_image, model_s3_uri, etc.) live in
# infra/components/<component>/envs/<env>.tfvars — update and commit before deploying.

env:
  AWS_REGION: ap-southeast-2

jobs:
  deploy:
    name: Deploy ${{ inputs.component }} → ${{ inputs.env }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Resolve deploy role ARN
        id: role
        run: |
          case "${{ inputs.env }}" in
            dev)  echo "arn=${{ vars.DEV_DEPLOY_ROLE_ARN }}"  >> "$GITHUB_OUTPUT" ;;
            sit)  echo "arn=${{ vars.SIT_DEPLOY_ROLE_ARN }}"  >> "$GITHUB_OUTPUT" ;;
            prod) echo "arn=${{ vars.PROD_DEPLOY_ROLE_ARN }}" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.role.outputs.arn }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform apply
        run: task apply COMPONENT=${{ inputs.component }} ENV=${{ inputs.env }} -- -auto-approve
