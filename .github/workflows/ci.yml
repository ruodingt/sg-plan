name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  ECR_REPO: eg-fraud-inference
  AWS_REGION: ap-southeast-2

jobs:

  # ── 0. Detect changed paths ────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      app:                ${{ steps.filter.outputs.app }}
      inference:          ${{ steps.filter.outputs.inference }}
      kinesis:            ${{ steps.filter.outputs.kinesis }}
      fraud_alert:        ${{ steps.filter.outputs.fraud_alert }}
      fraud_feature_pipe: ${{ steps.filter.outputs.fraud_feature_pipe }}
      monitoring:         ${{ steps.filter.outputs.monitoring }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'fraud_infer/**'
              - 'Dockerfile'
              - 'requirements*.txt'
            inference:
              - 'infra/components/inference/**'
              - 'infra/modules/sagemaker_inference/**'
            kinesis:
              - 'infra/components/kinesis/**'
            fraud_alert:
              - 'infra/components/fraud_alert/**'
            fraud_feature_pipe:
              - 'infra/components/fraud_feature_pipe/**'
            monitoring:
              - 'infra/components/monitoring/**'

  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: task lint

  # ── 2. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: task test

  # ── 3. Build & push to tooling ECR ────────────────────────────────────────
  #    Only when app code changes and we're merging to main.
  build:
    name: Build & push (tooling ECR)
    needs: [lint, test, changes]
    if: |
      needs.changes.outputs.app == 'true' &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials — tooling (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.TOOLING_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to tooling ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URI
        id: meta
        run: |
          echo "image_uri=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.meta.outputs.image_uri }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest
          cache-to: type=inline
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

  # ── 4. Terraform plan — changed components only ───────────────────────────
  #    Runs on PR and push. Build may have been skipped (TF-only changes).
  plan-dev:
    name: Plan → dev
    needs: [lint, test, changes, build]
    if: |
      always() &&
      needs.lint.result == 'success' &&
      needs.test.result == 'success' &&
      (
        needs.changes.outputs.app                == 'true' ||
        needs.changes.outputs.inference          == 'true' ||
        needs.changes.outputs.kinesis            == 'true' ||
        needs.changes.outputs.fraud_alert        == 'true' ||
        needs.changes.outputs.fraud_feature_pipe == 'true' ||
        needs.changes.outputs.monitoring         == 'true'
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials — dev (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DEV_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Plan changed components
        env:
          APP_CHANGED:      ${{ needs.changes.outputs.app }}
          INF_CHANGED:      ${{ needs.changes.outputs.inference }}
          KIN_CHANGED:      ${{ needs.changes.outputs.kinesis }}
          FA_CHANGED:       ${{ needs.changes.outputs.fraud_alert }}
          FFP_CHANGED:      ${{ needs.changes.outputs.fraud_feature_pipe }}
          MON_CHANGED:      ${{ needs.changes.outputs.monitoring }}
          NEW_IMAGE_URI:    ${{ needs.build.outputs.image_uri }}
        run: |
          plan() {
            local component=$1
            echo "::group::plan $component"
            task plan COMPONENT="$component" ENV=dev
            echo "::endgroup::"
          }

          # inference: triggered by app code changes OR TF changes
          if [[ "$APP_CHANGED" == "true" || "$INF_CHANGED" == "true" ]]; then
            # use newly built image URI if available; otherwise TF uses state value
            [[ -n "$NEW_IMAGE_URI" ]] && export TF_VAR_container_image="$NEW_IMAGE_URI"
            plan inference
          fi

          [[ "$KIN_CHANGED"  == "true" ]] && plan kinesis
          [[ "$FA_CHANGED"   == "true" ]] && plan fraud_alert
          [[ "$FFP_CHANGED"  == "true" ]] && plan fraud_feature_pipe
          [[ "$MON_CHANGED"  == "true" ]] && plan monitoring
